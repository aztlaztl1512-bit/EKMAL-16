<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حقيبة القدرات (إكمال الجمل 15) - أ/ عبدالعزيز الفيفي</title>
    <style>
        :root { 
            --primary: #1a237e; --secondary: #37474f; --accent: #ffab00; 
            --bg: #f4f7f6; --white: #ffffff; --correct: #2e7d32; --wrong: #c62828;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; line-height: 1.6; color: #333; font-weight: 400; }
        .quiz-card { background: var(--white); width: 100%; max-width: 950px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-top: 15px solid var(--primary); padding: 30px; position: relative; }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 25px; padding-bottom: 15px; }
        .info-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .student-badge { background: #e8eaf6; color: var(--primary); padding: 10px 20px; border-radius: 50px; font-weight: 500; border: 2px solid var(--primary); font-size: 0.9rem; }
        .timer-container { background: var(--secondary); color: white; padding: 10px 25px; border-radius: 50px; font-weight: 500; font-size: 1rem; transition: all 0.3s ease; }
        .timer-pulse { background: var(--wrong) !important; animation: pulse-animation 0.6s infinite alternate; }
        @keyframes pulse-animation { from { transform: scale(1); } to { transform: scale(1.1); } }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .option { padding: 16px; border: 2px solid #f0f0f0; border-radius: 15px; cursor: pointer; transition: 0.3s; font-weight: 500; background: #fafafa; font-size: 1rem; text-align: center; }
        .option:hover { border-color: var(--primary); background: #fdf7ff; transform: translateY(-2px); }
        .correct-opt { background: var(--correct) !important; color: white; border-color: var(--correct) !important; }
        .wrong-opt { background: var(--wrong) !important; color: white; border-color: var(--wrong) !important; }
        .feedback-box { margin-top: 20px; padding: 25px; border-radius: 15px; background: #fffde7; border-right: 10px solid var(--accent); display: none; font-size: 1rem; }
        .btn { background: var(--secondary); color: white; padding: 16px 45px; border: none; border-radius: 12px; cursor: pointer; font-size: 1.1rem; font-weight: 500; transition: 0.3s; }
        .btn:hover { background: var(--primary); }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 25px; background: white; font-size: 0.85rem; }
        .result-table th { background: var(--primary); color: white; padding: 12px; }
        .result-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body id="main-body">

<div class="quiz-card" id="quiz-container">
    <div class="header">
        <h3 id="author-name">✨ أ / عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓</h3>
        <h2 id="quiz-title">إكمال الجمل - النموذج الماسي (15) المنقح</h2>
    </div>

    <div id="start-page" style="text-align: center;">
        <p style="font-size: 1.1rem; margin-bottom: 20px;">⏱️ 45 ثانية للجملة | 🔀 خلط عشوائي كامل لـ 24 سؤالاً | 💡 إصلاح الفراغات</p>
        <input type="text" id="studentNameInput" placeholder="أدخل اسمك الثلاثي لبدء الاختبار..." style="width: 75%; padding: 15px; border-radius: 10px; border: 2px solid #ccc; text-align: center; font-size: 1rem; margin-bottom: 20px;">
        <br><button class="btn" onclick="startQuizAction()">ابدأ الاختبار 🚀</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="info-bar">
            <div id="current-student-display" class="student-badge"></div>
            <div id="timer-box" class="timer-container">⏳ المتبقي: <span id="timer-val">45</span> ثانية</div>
        </div>
        <div id="progress-text" style="font-weight: 500; color: var(--primary); margin-bottom: 10px; font-size: 0.9rem;"></div>
        <div id="question-display" style="font-size: 1.4rem; text-align: right; margin: 25px 0; font-weight: 500; color: #333; background: #f9f9f9; padding: 25px; border-radius: 20px; border: 1px solid #eee;"></div>
        <div id="options-container" class="options-grid"></div>
        <div id="feedback-display" class="feedback-box"></div>
        <div style="text-align: center; margin-top: 30px;">
            <button id="next-btn" class="btn hidden" onclick="loadNextQuestion()">الجملة التالية ⮕</button>
        </div>
    </div>

    <div id="result-page" class="hidden">
        <div style="text-align: center; padding: 25px; background: #e8eaf6; border-radius: 20px; border: 3px solid var(--primary); margin-bottom: 25px;">
            <h1 id="score-display" style="color: var(--primary); margin:0; font-size: 2.5rem;"></h1>
            <h2 id="final-student-name" style="color: var(--secondary); margin-top: 10px; font-size: 1.2rem;"></h2>
        </div>
        <table class="result-table">
            <thead>
                <tr>
                    <th>الجملة</th>
                    <th>إجابتك</th>
                    <th>الصحيحة</th>
                </tr>
            </thead>
            <tbody id="summary-body"></tbody>
        </table>
        <div style="text-align: center; margin-top: 30px;">
            <button class="btn" onclick="location.reload()">إعادة الاختبار 🔀</button>
        </div>
    </div>
</div>

<script>
    (function protect() {
        const teacher = "عبدالعزيز الفيفي";
        setInterval(() => {
            const auth = document.getElementById('author-name');
            if (!auth || !auth.innerText.includes(teacher)) {
                document.body.innerHTML = '<div style="text-align:center;padding:50px;color:red;"><h1>⚠️ انتهاك ملكية فكرية</h1></div>';
            }
        }, 3000);
    })();

    const masterPool = [
        { q: "أصدقاء السوء كحطب النار ........ بعضه بعضاً.", opts: ["يأكل", "يشعل", "يطفئ", "يفني"], a: "يأكل" },
        { q: "عف عن محارم الله تكن ........ ، وأحسن جوار من جاورك تكن ........", opts: ["عابدًا - مؤمنًا", "مؤمنًا - عابدًا", "غنيًا - مؤمنًا", "مؤمنًا - غنيًا"], a: "عابدًا - مؤمنًا" },
        { q: "الأسماك لها ........ اقتصادية من أهمها استخراج ........ الطبية من كبدها.", opts: ["أهمية - الأدوية", "منافع - الأشواك", "قيمة - العقاقير", "فوائد - الزيوت"], a: "فوائد - الزيوت" },
        { q: "الحرية روح كل ........ حي.. والطير يشدو في السماء حراً ........", opts: ["كائن - طليقاً", "مخلوق - جائعاً", "إنسان - جداً", "موجود - مغرداً"], a: "كائن - طليقاً" },
        { q: "الأخ الحقيقي من يترك في قلبك بصمته وتجد له أثراً كلما ........", opts: ["تذكرته", "سلمته", "نسيته", "تحديته"], a: "تذكرته" },
        { q: "قد يؤدي ........ عن الأغذية الحيوانية إلى حدوث ........ خطيرة.", opts: ["الامتناع - مضاعفات", "رفض - أوبئة", "الابتعاد - مواجهات", "الترك - أمراض"], a: "الامتناع - مضاعفات" },
        { q: "خالد يعتبر من أولئك الموهوبين الذين استطاعوا الجمع بين ........ وقوة الشخصية.", opts: ["المرح", "الهيبة", "الحزم", "التحدي"], a: "المرح" },
        { q: "........ المتواضع يكون أكثرهم علماً ، كما أن المكان ........ أكثر البقاع ماءً.", opts: ["العالم - المنخفض", "الشيخ - العالي", "الطالب - المرتفع", "الأديب - العذب"], a: "العالم - المنخفض" },
        { q: "البلاغة أن ........ فلا تبطئ و ........ فلا تخطئ.", opts: ["تُجيب - تُصيب", "تتكلم - تسمع", "تقود - تعود", "تسرع - تكتب"], a: "تُجيب - تُصيب" },
        { q: "لم تحظ خصائص الأدب الإفريقي بتقدير.. بل لم تكن ........ إلا منذ وقت قصير.", opts: ["مفهومة", "منسية", "موجودة", "مجهولة"], a: "مفهومة" },
        { q: "إذا .... في إصلاح أنفسنا وبيوتنا ........ أن نضم إليها الآخرين بكل سهولة.", opts: ["نجحنا - استطعنا", "جنحنا - قدرنا", "سعينا - ارتأينا", "حاولنا - فشلنا"], a: "نجحنا - استطعنا" },
        { q: "الشمس ........ والنجوم ........", opts: ["مضيئة - متلألئة", "ساخنة - باردة", "بعيدة - قريبة", "كبيرة - صغيرة"], a: "مضيئة - متلألئة" },
        { q: "من كان ........ في قوله كان ........ في فعله.", opts: ["صادقاً - مخلصاً", "كاذباً - جاداً", "متردداً - قوياً", "بطيئاً - سريعاً"], a: "صادقاً - مخلصاً" },
        { q: "الصحة ........ على رؤوس الأصحاء لا يراها إلا ........", opts: ["تاج - المرضى", "وسام - المتعبون", "كنز - الفقراء", "هالة - الضعفاء"], a: "تاج - المرضى" },
        { q: "يجب أن تكون الخطط ........ لتواجه ........ الطارئة.", opts: ["مرنة - الظروف", "ثابتة - التغيرات", "قديمة - الأزمات", "معقدة - المواقف"], a: "مرنة - الظروف" },
        { q: "القلق هو ........ الذي يمتص ........ غدك.", opts: ["اللص - طاقة", "الريح - هدوء", "الماء - عطش", "العدو - نصر"], a: "اللص - طاقة" },
        { q: "من اعتاد ........ في صغره، صعب عليه ........ في كبره.", opts: ["الكسل - الاجتهاد", "الكذب - الصدق", "اللعب - الجد", "النوم - الاستيقاظ"], a: "الكسل - الاجتهاد" },
        { q: "التفاؤل خير ........ للنجاح في ........", opts: ["دافع - الحياة", "سبب - الدراسة", "طريق - العمل", "وسيلة - الفشل"], a: "دافع - الحياة" },
        { q: "الابتسامة ........ لا تكلف شيئاً ولكنها ........ الكثير.", opts: ["رسالة - تبني", "كلمة - تنهي", "لغة - تعني", "نظرة - تخفي"], a: "رسالة - تبني" },
        { q: "العدل ........ المجتمعات، والظلم ........ الدول.", opts: ["أساس - هادم", "قوة - مضعف", "جمال - قبح", "حق - باطل"], a: "أساس - هادم" },
        { q: "من ........ للناس نال ........", opts: ["أحسن - محبتهم", "أساء - احترامهم", "تكلم - صمتهم", "ضحك - بكاءهم"], a: "أحسن - محبتهم" },
        { q: "العمر ........ لا يعود، والوقت ........ لا ينتظر.", opts: ["فرصة - قطار", "لحظة - سيف", "كنز - مال", "ذكرى - حلم"], a: "فرصة - قطار" },
        { q: "الصدق ........ والتحلي به ........", opts: ["فضيلة - منجاة", "واجب - متعب", "خلق - صعب", "قول - فعل"], a: "فضيلة - منجاة" },
        { q: "العلم في الصغر كـ ........ على الحجر.", opts: ["النقش", "الرسم", "الكتابة", "الظلام"], a: "النقش" }
    ];

    let currentIdx = 0, score = 0, timer, timeLeft = 45, logs = [], activeQs = [], sName = "";

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function startQuizAction() {
        const input = document.getElementById('studentNameInput').value;
        if (!input.trim() || input.length < 3) { alert("يرجى إدخال الاسم الثلاثي"); return; }
        sName = input;
        activeQs = shuffle([...masterPool]); 
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        document.getElementById('current-student-display').innerText = "👤 المتحدي: " + sName;
        loadQuestion();
    }

    function startTimer() {
        clearInterval(timer); timeLeft = 45;
        const tBox = document.getElementById('timer-box');
        const tVal = document.getElementById('timer-val');
        tBox.classList.remove('timer-pulse'); tVal.innerText = timeLeft;
        timer = setInterval(() => {
            timeLeft--; tVal.innerText = timeLeft;
            if (timeLeft <= 5) tBox.classList.add('timer-pulse');
            if (timeLeft <= 0) { clearInterval(timer); handleAns(null, null); }
        }, 1000);
    }

    function loadQuestion() {
        if (currentIdx >= activeQs.length) return endQuiz();
        const q = activeQs[currentIdx];
        document.getElementById('progress-text').innerText = `جملة ${currentIdx + 1} من ${activeQs.length}`;
        document.getElementById('question-display').innerText = q.q;
        document.getElementById('feedback-display').style.display = 'none';
        document.getElementById('next-btn').classList.add('hidden');
        const box = document.getElementById('options-container'); box.innerHTML = '';
        
        const shuffledOpts = shuffle([...q.opts]);
        shuffledOpts.forEach(opt => {
            const div = document.createElement('div'); 
            div.className = 'option'; 
            div.innerText = opt;
            div.onclick = () => handleAns(opt, div); 
            box.appendChild(div);
        });
        startTimer();
    }

    function handleAns(sel, el) {
        clearInterval(timer);
        document.getElementById('timer-box').classList.remove('timer-pulse');
        const q = activeQs[currentIdx];
        const opts = document.querySelectorAll('.option');
        opts.forEach(o => o.onclick = null);
        let isCorrect = (sel === q.a);
        if (isCorrect) { if(el) el.classList.add('correct-opt'); score++; }
        else { 
            if(el) el.classList.add('wrong-opt'); 
            opts.forEach(o => { if(o.innerText === q.a) o.classList.add('correct-opt'); }); 
        }
        
        const fb = document.getElementById('feedback-display');
        fb.style.display = 'block';
        fb.innerHTML = `<strong>💡 التحليل:</strong> ${isCorrect ? 'أحسنت! إكمال دقيق ومنطقي للسياق.' : 'الإجابة الصحيحة هي: ' + q.a}<br><br><small>✨ أ / عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓</small>`;
        document.getElementById('next-btn').classList.remove('hidden');
        logs.push({ q: q.q, user: sel || "انتهى الوقت ⏰", correct: q.a });
    }

    function loadNextQuestion() { currentIdx++; loadQuestion(); }

    function endQuiz() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        document.getElementById('score-display').innerText = `الدرجة النهائية: ${score} من ${activeQs.length}`;
        document.getElementById('final-student-name').innerText = `بطل التحدي: ${sName}`;
        const tbody = document.getElementById('summary-body');
        logs.forEach(l => {
            tbody.innerHTML += `<tr><td>${l.q}</td><td style="color:${l.user === l.correct ? 'green':'red'}">${l.user}</td><td style="color:green; font-weight:bold">${l.correct}</td></tr>`;
        });
    }
</script>
</body>
</html>
